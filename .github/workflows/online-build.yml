name: TabSSH Linux HAP format build

on:
  workflow_dispatch:
    inputs:
      sdk_sha256:
        description: Optional SHA256 for HARMONYOS_SDK_URL archive
        required: false
        default: ""
        type: string
      full_sha256:
        description: Optional SHA256 for HARMONYOS_FULL_URL archive
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  hap-format:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and unpack SDK packages
        shell: bash
        env:
          SDK_URL: ${{ secrets.HARMONYOS_SDK_URL }}
          FULL_URL: ${{ secrets.HARMONYOS_FULL_URL }}
          SDK_SHA256: ${{ inputs.sdk_sha256 }}
          FULL_SHA256: ${{ inputs.full_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "$SDK_URL" ] && [ -z "$FULL_URL" ]; then
            echo "HARMONYOS_SDK_URL or HARMONYOS_FULL_URL is required." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/harmony-sdk" "$RUNNER_TEMP/harmony-sdk-extract"

          unpack_archive() {
            local archive="$1"
            local dest="$2"
            mkdir -p "$dest"
            if file "$archive" | grep -qi 'Zip archive'; then
              unzip -q "$archive" -d "$dest"
            elif file "$archive" | grep -Eqi 'gzip|XZ compressed|bzip2|tar archive'; then
              tar -xf "$archive" -C "$dest"
            else
              echo "Unsupported archive format:" >&2
              file "$archive" >&2
              exit 1
            fi
          }

          if [ -n "$SDK_URL" ]; then
            SDK_ARCHIVE="$RUNNER_TEMP/harmony-sdk/sdk-package"
            curl -fL --retry 3 --retry-delay 5 "$SDK_URL" -o "$SDK_ARCHIVE"
            if [ -n "$SDK_SHA256" ]; then
              echo "$SDK_SHA256  $SDK_ARCHIVE" | sha256sum -c -
            fi
            unpack_archive "$SDK_ARCHIVE" "$RUNNER_TEMP/harmony-sdk-extract/sdk"
          fi

          if [ -n "$FULL_URL" ]; then
            FULL_ARCHIVE="$RUNNER_TEMP/harmony-sdk/full-package"
            curl -fL --retry 3 --retry-delay 5 "$FULL_URL" -o "$FULL_ARCHIVE"
            if [ -n "$FULL_SHA256" ]; then
              echo "$FULL_SHA256  $FULL_ARCHIVE" | sha256sum -c -
            fi
            unpack_archive "$FULL_ARCHIVE" "$RUNNER_TEMP/harmony-sdk-extract/full"
          fi

          find "$RUNNER_TEMP/harmony-sdk-extract" -maxdepth 4 -type d | sort | head -200

          HVIGOR_ENTRY="$(find "$RUNNER_TEMP/harmony-sdk-extract" -type f -path '*/hvigor/bin/hvigorw.js' -print -quit)"
          OPENHARMONY_DIR="$(find "$RUNNER_TEMP/harmony-sdk-extract" -type d -path '*/openharmony' -print -quit)"
          if [ -z "$HVIGOR_ENTRY" ]; then
            echo "Cannot find hvigor/bin/hvigorw.js." >&2
            exit 1
          fi
          if [ -z "$OPENHARMONY_DIR" ]; then
            echo "Cannot find openharmony directory." >&2
            exit 1
          fi

          TOOLS_ROOT="${HVIGOR_ENTRY%/hvigor/bin/hvigorw.js}"
          HWSDK_ROOT="$(dirname "$OPENHARMONY_DIR")"
          NODE_ROOT="$(dirname "$(dirname "$(command -v node)")")"

          echo "DEVECO_TOOLS_ROOT=$TOOLS_ROOT" >> "$GITHUB_ENV"
          echo "TABSSH_HWSDK_ROOT=$HWSDK_ROOT" >> "$GITHUB_ENV"
          echo "HARMONYOS_SDK_DIR=$OPENHARMONY_DIR" >> "$GITHUB_ENV"
          echo "HARMONYOS_NODE_DIR=$NODE_ROOT" >> "$GITHUB_ENV"

          {
            echo "sdk.dir=$OPENHARMONY_DIR"
            echo "hwsdk.dir=$HWSDK_ROOT"
            echo "npm.dir=$NODE_ROOT"
          } > local.properties

          echo "Detected DevEco tools: $TOOLS_ROOT"
          echo "Detected HW SDK root: $HWSDK_ROOT"
          echo "Detected OpenHarmony SDK: $OPENHARMONY_DIR"
          echo "Detected Node root: $NODE_ROOT"

      - name: Build unsigned HAP with Hvigor
        shell: bash
        run: |
          set -euo pipefail
          node scripts/run_hvigor_with_sdk_patch.js assembleHap

      - name: Collect and verify HAP format
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/hap-out"
          mapfile -t HAPS < <(find . -type f -path '*/outputs/*' -name '*.hap' | sort)
          if [ "${#HAPS[@]}" -eq 0 ]; then
            echo "Build finished but no .hap was found under outputs." >&2
            exit 1
          fi
          HAP="${HAPS[0]}"
          cp "$HAP" "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap"
          unzip -t "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap"
          unzip -l "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap" | tee "$RUNNER_TEMP/hap-out/hap-list.txt"
          if ! unzip -l "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap" | grep -q 'arm64-v8a.*libentry.so'; then
            echo "Missing arm64-v8a libentry.so in HAP." >&2
            exit 1
          fi
          if ! unzip -l "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap" | grep -q 'x86_64.*libentry.so'; then
            echo "Missing x86_64 libentry.so in HAP." >&2
            exit 1
          fi
          sha256sum "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap" | tee "$RUNNER_TEMP/hap-out/entry-default-unsigned.hap.sha256"

      - name: Upload unsigned HAP
        uses: actions/upload-artifact@v4
        with:
          name: opentabssh-linux-unsigned-hap-format-test
          path: |
            ${{ runner.temp }}/hap-out/entry-default-unsigned.hap
            ${{ runner.temp }}/hap-out/entry-default-unsigned.hap.sha256
            ${{ runner.temp }}/hap-out/hap-list.txt
          if-no-files-found: error
