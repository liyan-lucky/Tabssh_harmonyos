name: TabSSH HAP format build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hap-format:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned HAP
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_mock_hap.ps1

      - name: Verify HAP package format
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify_mock_hap.ps1 -HapPath "$((Resolve-Path ..).Path)\99_Temp\harmonyos_build\10_Tabssh_harmonyos\entry-default-unsigned.hap"

      - name: Upload unsigned HAP
        uses: actions/upload-artifact@v4
        with:
          name: opentabssh-unsigned-hap-format-test
          path: ${{ github.workspace }}/../99_Temp/harmonyos_build/10_Tabssh_harmonyos/entry-default-unsigned.hap
          if-no-files-found: error
