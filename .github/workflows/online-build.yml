name: TabSSH Linux HAP 4-package build

on:
  workflow_dispatch:
    inputs:
      sdk_sha256:
        description: Optional SHA256 for HARMONYOS_SDK_URL archive
        required: false
        default: ""
        type: string
      full_sha256:
        description: Optional SHA256 for HARMONYOS_FULL_URL archive
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  hap-format:
    name: ${{ matrix.platform_name }} ${{ matrix.abi }} unsigned HAP
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: harmonyos
            platform_name: HarmonyOS
            runtime_os: HarmonyOS
            abi: arm64-v8a
          - platform: harmonyos
            platform_name: HarmonyOS
            runtime_os: HarmonyOS
            abi: x86_64
          - platform: openharmony
            platform_name: OpenHarmony
            runtime_os: HarmonyOS
            abi: arm64-v8a
          - platform: openharmony
            platform_name: OpenHarmony
            runtime_os: HarmonyOS
            abi: x86_64
    env:
      CI: "true"
      BUILD_PLATFORM: ${{ matrix.platform }}
      BUILD_PLATFORM_NAME: ${{ matrix.platform_name }}
      BUILD_RUNTIME_OS: ${{ matrix.runtime_os }}
      BUILD_ABI: ${{ matrix.abi }}
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
      HARMONYOS_FULL_URL: ${{ secrets.HARMONYOS_FULL_URL || vars.HARMONYOS_FULL_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync

      - name: Setup HarmonyOS SDK base
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: Install full HarmonyOS SDK
        shell: bash
        env:
          SDK_SHA256: ${{ inputs.sdk_sha256 }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [ -z "${HARMONYOS_SDK_URL:-}" ]; then
            echo "HARMONYOS_SDK_URL is empty"
            exit 1
          fi

          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ZIP="$RUNNER_TEMP/harmonyos-sdk-full.zip"
          SDK_EXTRACT="$RUNNER_TEMP/harmonyos-sdk-full"

          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT"

          echo "Download full HarmonyOS SDK"
          curl -L --fail --retry 3 --retry-delay 5 -o "$SDK_ZIP" "$HARMONYOS_SDK_URL"
          if [ -n "$SDK_SHA256" ]; then
            echo "$SDK_SHA256  $SDK_ZIP" | sha256sum -c -
          fi

          echo "Unzip full HarmonyOS SDK"
          unzip -oq "$SDK_ZIP" -d "$SDK_EXTRACT"

          echo "SDK archive directories"
          find "$SDK_EXTRACT" -maxdepth 3 -type d | sort | head -80

          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SDK_SOURCE" ]; then
            echo "Could not locate SDK root in archive."
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -120
            exit 1
          fi

          echo "SDK source: $SDK_SOURCE"
          mkdir -p "$SDK_BASE"

          move_sdk_item() {
            local source_path="$1"
            local target_path="$2"
            if [ -e "$source_path" ]; then
              rm -rf "$target_path"
              mv "$source_path" "$target_path"
            fi
          }

          move_sdk_item "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            move_sdk_item "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            move_sdk_item "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          move_sdk_item "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"

          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi

          rm -f "$SDK_ZIP"
          rm -rf "$SDK_EXTRACT"

          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/llvm/bin"/* 2>/dev/null || true

          echo "Check full SDK files"
          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -d "$SDK_BASE/openharmony/native"
          test -f "$SDK_BASE/hms/toolchains/modulecheck/app.json"
          test -f "$SDK_BASE/hms/toolchains/lib/libimage_transcoder_shared.so"
          test -f "$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin/libsec_shared.so"
          test -f "$SDK_BASE/openharmony/previewer/common/bin/libcjson.so"
          test -f "$SDK_BASE/openharmony/previewer/common/bin/libsec_shared.so"

      - name: Patch full hvigor
        shell: bash
        env:
          FULL_SHA256: ${{ inputs.full_sha256 }}
        run: |
          set -euo pipefail

          if [ -z "${HARMONYOS_FULL_URL:-}" ]; then
            echo "HARMONYOS_FULL_URL is empty"
            exit 1
          fi

          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          HVIGOR_ZIP="$RUNNER_TEMP/harmonyos-hvigor-full.zip"

          cd "$TOOLS_DIR"
          rm -rf hvigor

          echo "Download full hvigor"
          curl -L --fail --retry 3 --retry-delay 5 -o "$HVIGOR_ZIP" "$HARMONYOS_FULL_URL"
          if [ -n "$FULL_SHA256" ]; then
            echo "$FULL_SHA256  $HVIGOR_ZIP" | sha256sum -c -
          fi

          echo "Unzip full hvigor"
          unzip -oq "$HVIGOR_ZIP" -d "$TOOLS_DIR"

          echo "Check patched hvigor"
          find "$TOOLS_DIR/hvigor" -name "hvigorw.js" | head -20
          find "$TOOLS_DIR/hvigor" -name "platform-sdks.js" | head -20
          test -f "$TOOLS_DIR/hvigor/bin/hvigorw.js"
          test -f "$TOOLS_DIR/hvigor/hvigor-ohos-plugin/node_modules/@ohos/hos-sdkmanager-common/build/src/hos/mapper/platform-sdks.js"

      - name: Locate HarmonyOS SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_BASE="/home/runner/harmonyos-sdk"
          NODE_ROOT="$(dirname "$(dirname "$(command -v node)")")"
          PATCH_REQUIRE="$GITHUB_WORKSPACE/scripts/run_hvigor_with_sdk_patch.js"

          echo "Listing HarmonyOS SDK"
          find "$SDK_BASE" -maxdepth 6 -type d | sort || true

          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_ROOT=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "TABSSH_HWSDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "HARMONYOS_SDK_DIR=$SDK_BASE/openharmony" >> "$GITHUB_ENV"
          echo "HARMONYOS_NODE_DIR=$NODE_ROOT" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "NODE_OPTIONS=--require=$PATCH_REQUIRE ${NODE_OPTIONS:-}" >> "$GITHUB_ENV"
          echo "PATH=$SDK_BASE/command-line-tools/bin:$SDK_BASE/command-line-tools/ohpm/bin:$SDK_BASE/command-line-tools/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

          {
            echo "sdk.dir=$SDK_BASE/openharmony"
            echo "hwsdk.dir=$SDK_BASE"
            echo "npm.dir=$NODE_ROOT"
          } > local.properties

          echo "DEVECO_TOOLS_ROOT=$SDK_BASE/command-line-tools"
          echo "TABSSH_HWSDK_ROOT=$SDK_BASE"
          echo "HARMONYOS_SDK_DIR=$SDK_BASE/openharmony"
          echo "BUILD_PLATFORM=$BUILD_PLATFORM"
          echo "BUILD_RUNTIME_OS=$BUILD_RUNTIME_OS"
          echo "BUILD_ABI=$BUILD_ABI"
          echo "NODE_OPTIONS=--require=$PATCH_REQUIRE ${NODE_OPTIONS:-}"
          node -v

      - name: Prepare 4-package matrix profile
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          runtime_os = os.environ['BUILD_RUNTIME_OS']
          abi = os.environ['BUILD_ABI']

          root_profile = Path('build-profile.json5')
          root_data = json.loads(root_profile.read_text(encoding='utf-8'))
          root_data['app']['products'][0]['runtimeOS'] = runtime_os
          root_profile.write_text(json.dumps(root_data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          entry_profile = Path('entry/build-profile.json5')
          entry_data = json.loads(entry_profile.read_text(encoding='utf-8'))
          entry_data['buildOption']['externalNativeOptions']['abiFilters'] = [abi]
          entry_profile.write_text(json.dumps(entry_data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          echo "Root build profile:"
          cat build-profile.json5
          echo "Entry build profile:"
          cat entry/build-profile.json5
          rm -rf entry/build entry/.preview default outputs .hvigor

      - name: Build unsigned HAP with Hvigor
        shell: bash
        run: |
          set -euo pipefail
          export NODE_OPTIONS="--require=$GITHUB_WORKSPACE/scripts/run_hvigor_with_sdk_patch.js ${NODE_OPTIONS:-}"
          node scripts/run_hvigor_with_sdk_patch.js assembleHap

      - name: Collect and verify HAP format
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/hap-out/$BUILD_PLATFORM-$BUILD_ABI"
          HAP_NAME="entry-default-${BUILD_PLATFORM}-${BUILD_ABI}-unsigned.hap"
          mkdir -p "$OUT_DIR"
          mapfile -t HAPS < <(find "$GITHUB_WORKSPACE" -type f -path '*/outputs/*' -name '*.hap' | sort)
          if [ "${#HAPS[@]}" -eq 0 ]; then
            echo "Build finished but no .hap was found under outputs." >&2
            find "$GITHUB_WORKSPACE" -type d -name outputs -print >&2 || true
            exit 1
          fi
          HAP="${HAPS[0]}"
          cp "$HAP" "$OUT_DIR/$HAP_NAME"
          unzip -t "$OUT_DIR/$HAP_NAME"
          unzip -l "$OUT_DIR/$HAP_NAME" | tee "$OUT_DIR/hap-list.txt"
          if ! unzip -l "$OUT_DIR/$HAP_NAME" | grep -q "$BUILD_ABI.*libentry.so"; then
            echo "Missing $BUILD_ABI libentry.so in HAP." >&2
            exit 1
          fi
          OTHER_ABI="arm64-v8a"
          if [ "$BUILD_ABI" = "arm64-v8a" ]; then
            OTHER_ABI="x86_64"
          fi
          if unzip -l "$OUT_DIR/$HAP_NAME" | grep -q "$OTHER_ABI.*libentry.so"; then
            echo "Unexpected $OTHER_ABI libentry.so found in single-ABI package." >&2
            exit 1
          fi
          {
            echo "platform=$BUILD_PLATFORM_NAME"
            echo "runtimeOS=$BUILD_RUNTIME_OS"
            echo "abi=$BUILD_ABI"
            echo "hap=$HAP_NAME"
            sha256sum "$OUT_DIR/$HAP_NAME"
          } | tee "$OUT_DIR/manifest.txt"
          sha256sum "$OUT_DIR/$HAP_NAME" | tee "$OUT_DIR/$HAP_NAME.sha256"

      - name: Upload unsigned HAP
        uses: actions/upload-artifact@v4
        with:
          name: opentabssh-${{ matrix.platform }}-${{ matrix.abi }}-unsigned-hap
          path: ${{ runner.temp }}/hap-out/${{ matrix.platform }}-${{ matrix.abi }}/*
          if-no-files-found: error
