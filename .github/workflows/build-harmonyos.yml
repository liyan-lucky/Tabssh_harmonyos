name: 构建并发布 HarmonyOS HAP

on:
  workflow_dispatch:
    inputs:
      版本号处理:
        description: "打包前如何处理版本号"
        required: true
        default: "不改版本"
        type: choice
        options:
          - "不改版本"
          - "增量版本"
          - "完整版本"
      跳过包验证:
        description: "true 表示跳过 HAP 包验证；false 表示执行验证"
        required: true
        default: true
        type: boolean
      创建发布:
        description: "true 表示创建 GitHub 标签和 Release；false 只上传 workflow artifact"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: 构建 HAP
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CI: "true"
      VERSION_BUMP: ${{ inputs['版本号处理'] == '完整版本' && 'full' || inputs['版本号处理'] == '增量版本' && 'incremental' || 'none' }}
      SKIP_PACKAGE_VERIFY: ${{ inputs['跳过包验证'] }}
      SDK_REPO: liyan-lucky/HarmonyOS_SDK_Tools
      SDK_TAG: linux_command_line_tool_6.1.1
      SDK_ASSET: linux-harmonyos-command-line-tool-full.7z

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: 设置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip p7zip-full curl jq python3 rsync

      - name: 设置基础 HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: 校验 SDK Token 输入
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HARMONYOS_SDK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "缺少 HARMONYOS_SDK_TOKEN。请在仓库 Secrets 中配置可读取私有 SDK 仓库的 Token。"
            exit 1
          fi

      - name: 安装完整 HarmonyOS SDK
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HARMONYOS_SDK_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ARCHIVE="$RUNNER_TEMP/$SDK_ASSET"
          SDK_EXTRACT="$RUNNER_TEMP/authorized-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"

          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT"

          echo "从私有 SDK 仓库下载完整 HarmonyOS SDK：$SDK_REPO / $SDK_TAG / $SDK_ASSET"
          gh release download "$SDK_TAG" \
            --repo "$SDK_REPO" \
            --pattern "$SDK_ASSET" \
            --dir "$RUNNER_TEMP"

          if [ ! -f "$SDK_ARCHIVE" ]; then
            echo "SDK 资产未下载成功：$SDK_ARCHIVE"
            ls -la "$RUNNER_TEMP"
            exit 1
          fi

          echo "解压完整 HarmonyOS SDK..."
          case "$SDK_ASSET" in
            *.zip)
              unzip -oq "$SDK_ARCHIVE" -d "$SDK_EXTRACT"
              ;;
            *.7z)
              7z x -y "$SDK_ARCHIVE" -o"$SDK_EXTRACT"
              ;;
            *)
              echo "不支持的 SDK 压缩包格式：$SDK_ASSET"
              exit 1
              ;;
          esac

          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default \
            "$SDK_EXTRACT"/*/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SDK_SOURCE" ]; then
            SDK_SOURCE=$(find "$SDK_EXTRACT" -maxdepth 6 -type f -name sdk-pkg.json -print -quit | xargs -r dirname || true)
          fi

          if [ -z "$SDK_SOURCE" ]; then
            echo "未能在压缩包中定位 SDK 根目录。"
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -120
            exit 1
          fi

          TOOLS_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT"/command-line-tools \
            "$SDK_EXTRACT"/*/command-line-tools \
            "$SDK_EXTRACT"/*/*/command-line-tools
          do
            if [ -d "$candidate" ]; then
              TOOLS_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$TOOLS_SOURCE" ]; then
            TOOLS_SOURCE=$(find "$SDK_EXTRACT" -maxdepth 6 -type d -name command-line-tools -print -quit || true)
          fi

          rm -rf "$SDK_BASE"
          mkdir -p "$SDK_BASE"

          move_sdk_item() {
            local source_path="$1"
            local target_path="$2"
            if [ -e "$source_path" ]; then
              rm -rf "$target_path"
              mv "$source_path" "$target_path"
            fi
          }

          move_sdk_item "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            move_sdk_item "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            move_sdk_item "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          move_sdk_item "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"

          if [ -n "$TOOLS_SOURCE" ] && [ -d "$TOOLS_SOURCE" ]; then
            rm -rf "$TOOLS_DIR"
            mkdir -p "$(dirname "$TOOLS_DIR")"
            mv "$TOOLS_SOURCE" "$TOOLS_DIR"
          fi

          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi

          rm -f "$SDK_ARCHIVE"
          rm -rf "$SDK_EXTRACT"
          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_DIR"/ohpm/bin/* 2>/dev/null || true
          chmod +x "$TOOLS_DIR"/hvigor/bin/* 2>/dev/null || true

          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -d "$SDK_BASE/openharmony/native"
          test -d "$TOOLS_DIR"

      - name: 定位 HarmonyOS SDK
        shell: bash
        run: |
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          NODE_ROOT="$(dirname "$(dirname "$(command -v node)")")"
          PATCH_REQUIRE="$GITHUB_WORKSPACE/scripts/run_hvigor_with_sdk_patch.js"
          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$TOOLS_DIR" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_ROOT=$TOOLS_DIR" >> "$GITHUB_ENV"
          echo "TABSSH_HWSDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "HARMONYOS_SDK_DIR=$SDK_BASE/openharmony" >> "$GITHUB_ENV"
          echo "HARMONYOS_NODE_DIR=$NODE_ROOT" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "NODE_OPTIONS=--require=$PATCH_REQUIRE ${NODE_OPTIONS:-}" >> "$GITHUB_ENV"
          echo "PATH=$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          {
            echo "sdk.dir=$SDK_BASE/openharmony"
            echo "hwsdk.dir=$SDK_BASE"
            echo "npm.dir=$NODE_ROOT"
          } > local.properties
          node -v

      - name: 初始化 ohpm 和 hvigor
        shell: bash
        run: |
          set -e
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          export PATH="$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH"
          if [ -f "$TOOLS_DIR/ohpm/bin/init" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/init" && "$TOOLS_DIR/ohpm/bin/init" || true; fi
          if [ -f "$TOOLS_DIR/ohpm/bin/init.sh" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/init.sh" && "$TOOLS_DIR/ohpm/bin/init.sh" || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/init" ]; then chmod +x "$TOOLS_DIR/hvigor/bin/init" && "$TOOLS_DIR/hvigor/bin/init" || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/init.sh" ]; then chmod +x "$TOOLS_DIR/hvigor/bin/init.sh" && "$TOOLS_DIR/hvigor/bin/init.sh" || true; fi
          if [ -f "$TOOLS_DIR/ohpm/bin/ohpm" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/ohpm" && "$TOOLS_DIR/ohpm/bin/ohpm" -v || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/hvigorw.js" ]; then node "$TOOLS_DIR/hvigor/bin/hvigorw.js" --version || true; fi
          if [ -f "oh-package.json5" ]; then "$TOOLS_DIR/ohpm/bin/ohpm" install || true; fi

      - name: 输出调试环境
        shell: bash
        run: |
          echo "DEVECO_SDK_HOME=$DEVECO_SDK_HOME"
          echo "OHOS_HVIGOR_SDK_ROOT=$OHOS_HVIGOR_SDK_ROOT"
          echo "DEVECO_NODE_EXE=$DEVECO_NODE_EXE"
          echo "SDK_REPO=$SDK_REPO"
          echo "SDK_TAG=$SDK_TAG"
          echo "SDK_ASSET=$SDK_ASSET"

      - name: 按需处理版本号
        shell: bash
        run: |
          set -euo pipefail
          if [ "$VERSION_BUMP" = "none" ]; then
            echo "不改版本号。"
            exit 0
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path
          mode = "${{ env.VERSION_BUMP }}"
          path = Path("AppScope/app.json5")
          text = path.read_text(encoding="utf-8")
          code_match = re.search(r'"versionCode"\s*:\s*(\d+)', text)
          name_match = re.search(r'"versionName"\s*:\s*"([^"]+)"', text)
          if not code_match or not name_match:
              raise SystemExit("versionCode 或 versionName 未找到")
          version_code = int(code_match.group(1)) + 1
          version_name = name_match.group(1)
          if mode == "full":
              parts = [int(x) for x in version_name.split(".") if x.isdigit()]
              while len(parts) < 3:
                  parts.append(0)
              parts[1] += 1
              parts[2] = 0
              version_name = ".".join(map(str, parts[:3]))
          elif mode == "incremental":
              parts = [int(x) for x in version_name.split(".") if x.isdigit()]
              while len(parts) < 3:
                  parts.append(0)
              parts[2] += 1
              version_name = ".".join(map(str, parts[:3]))
          text = re.sub(r'"versionCode"\s*:\s*\d+', f'"versionCode": {version_code}', text)
          text = re.sub(r'"versionName"\s*:\s*"[^"]+"', f'"versionName": "{version_name}"', text)
          path.write_text(text, encoding="utf-8")
          print(f"versionCode={version_code} versionName={version_name}")
          PY

      - name: 刷新 BuildInfo
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from datetime import datetime
          from pathlib import Path
          try:
              from zoneinfo import ZoneInfo
              now = datetime.now(ZoneInfo("Asia/Shanghai"))
              build_time = now.strftime("%Y-%m-%d %H:%M:%S +08:00")
          except Exception:
              build_time = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S +00:00")
          app_text = Path("AppScope/app.json5").read_text(encoding="utf-8")
          version_name = re.search(r'"versionName"\s*:\s*"([^"]+)"', app_text)
          version_code = re.search(r'"versionCode"\s*:\s*(\d+)', app_text)
          if not version_name or not version_code:
              raise SystemExit("versionName 或 versionCode 未找到")
          out = Path("entry/src/main/ets/common/BuildInfo.ets")
          out.write_text(
              "export class BuildInfo {\n"
              f"  static readonly APP_VERSION_NAME: string = '{version_name.group(1)}';\n"
              f"  static readonly APP_VERSION_CODE: number = {version_code.group(1)};\n"
              f"  static readonly BUILD_TIME: string = '{build_time}';\n"
              "}\n",
              encoding="utf-8"
          )
          print(f"BuildInfo version={version_name.group(1)} code={version_code.group(1)} time={build_time}")
          PY

      - name: 构建 HAP
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/tabssh_harmonyos_artifacts
        run: |
          set -euo pipefail
          TOOLS_DIR="/home/runner/harmonyos-sdk/command-line-tools"
          export PATH="$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH"
          mkdir -p "$HARMONY_ARTIFACTS_DIR"

          node scripts/run_hvigor_with_sdk_patch.js assembleHap

          find . -type f \( -name "*.hap" -o -name "*.hsp" \) -print
          find . -type f -name "*.hap" -exec cp -f {} "$HARMONY_ARTIFACTS_DIR/" \;
          test -n "$(find "$HARMONY_ARTIFACTS_DIR" -type f -name '*.hap' -print -quit)"
          {
            echo "versionName=$(grep -oP '\"versionName\"\\s*:\\s*\"\\K[^\"]+' AppScope/app.json5 | head -1)"
            echo "versionCode=$(grep -oP '\"versionCode\"\\s*:\\s*\\K[0-9]+' AppScope/app.json5 | head -1)"
            echo "buildTime=$(grep -oP \"BUILD_TIME:\\s*string\\s*=\\s*'\\K[^']+\" entry/src/main/ets/common/BuildInfo.ets | head -1)"
            echo "commit=$GITHUB_SHA"
          } > "$HARMONY_ARTIFACTS_DIR/version.env"
          find "$HARMONY_ARTIFACTS_DIR" -type f -name "*.hap" -exec sha256sum {} \; | tee "$HARMONY_ARTIFACTS_DIR/SHA256SUMS.txt"
          for hap in "$HARMONY_ARTIFACTS_DIR"/*.hap; do
            unzip -l "$hap" > "$hap.filelist.txt"
          done

      - name: 验证 HAP 包
        if: ${{ inputs['跳过包验证'] != true }}
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/tabssh_harmonyos_artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          haps=("$HARMONY_ARTIFACTS_DIR"/*.hap)
          if [ "${#haps[@]}" -eq 0 ]; then
            echo "没有找到待验证的 HAP。"
            exit 1
          fi
          for hap in "${haps[@]}"; do
            echo "验证 $hap"
            unzip -t "$hap"
            unzip -l "$hap" | tee "$hap.verify-list.txt"
            if ! unzip -l "$hap" | grep -q 'arm64-v8a/.*libentry.so'; then
              echo "缺少 arm64-v8a libentry.so"
              exit 1
            fi
            if ! unzip -l "$hap" | grep -q 'x86_64/.*libentry.so'; then
              echo "缺少 x86_64 libentry.so"
              exit 1
            fi
          done

      - name: 上传 HarmonyOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: tabssh-hap
          path: ${{ runner.temp }}/tabssh_harmonyos_artifacts/*
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    if: ${{ inputs['创建发布'] == true }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载 HAP 构建产物
        uses: actions/download-artifact@v4
        with:
          name: tabssh-hap
          path: ${{ runner.temp }}/release_artifacts

      - name: 准备 Release
        shell: bash
        run: |
          VERSION_FILE="$RUNNER_TEMP/release_artifacts/version.env"
          if [ -f "$VERSION_FILE" ]; then
            source "$VERSION_FILE"
            APP_VERSION="${versionName:-}"
          else
            APP_VERSION=$(grep -oP '"versionName"\s*:\s*"\K[^"]+' AppScope/app.json5 | head -1)
          fi
          RELEASE_TAG="OpenTabSsh-Build-v${APP_VERSION:-0.0.0}"
          RELEASE_NAME="OpenTabSsh Build v${APP_VERSION:-0.0.0}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_BODY=$(awk '/^## /{if(found){exit} found=1; next} found{print}' CHANGELOG.md | head -200)
          else
            CHANGELOG_BODY="See commit history for details."
          fi
          echo "CHANGELOG_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$CHANGELOG_BODY" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/release_files"
          shopt -s nullglob
          cp "$RUNNER_TEMP/release_artifacts/"*.hap "$RUNNER_TEMP/release_files/"
          cp "$RUNNER_TEMP/release_artifacts/SHA256SUMS.txt" "$RUNNER_TEMP/release_files/" 2>/dev/null || true
          cp "$RUNNER_TEMP/release_artifacts/version.env" "$RUNNER_TEMP/release_files/" 2>/dev/null || true
          for extra in "$RUNNER_TEMP/release_artifacts/"*.filelist.txt "$RUNNER_TEMP/release_artifacts/"*.verify-list.txt; do
            cp "$extra" "$RUNNER_TEMP/release_files/"
          done
          ls -lh "$RUNNER_TEMP/release_files/"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.CHANGELOG_BODY }}
          files: |
            ${{ runner.temp }}/release_files/*
